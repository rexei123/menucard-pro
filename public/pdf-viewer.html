<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PDF-Vorschau</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f3f4f6; display:flex; flex-direction:column; align-items:center; padding:16px; gap:16px; font-family:system-ui; }
canvas { background:white; box-shadow:0 2px 8px rgba(0,0,0,.15); max-width:100%; height:auto!important; }
.info { font-size:12px; color:#9ca3af; }
.msg { color:#6b7280; padding:40px; text-align:center; }
</style>
</head>
<body>
<div id="v"><div class="msg">PDF wird geladen...</div></div>
<script>
var u=new URLSearchParams(location.search).get('url'),v=document.getElementById('v');
if(!u){v.innerHTML='<div class="msg">Keine URL</div>';}else{
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
pdfjsLib.getDocument(u).promise.then(async function(p){
v.innerHTML='';
for(var i=1;i<=p.numPages;i++){
var pg=await p.getPage(i),vp=pg.getViewport({scale:1.5}),c=document.createElement('canvas');
c.width=vp.width;c.height=vp.height;
await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
v.appendChild(c);
var d=document.createElement('div');d.className='info';d.textContent='Seite '+i+' / '+p.numPages;v.appendChild(d);
}
}).catch(function(e){v.innerHTML='<div class="msg" style="color:red">Fehler: '+e.message+'</div>';});}
</script>
</body>
</html>
